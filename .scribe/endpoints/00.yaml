        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": "Login berhasil",
            "data": {
              "token": "1|abcdef1234567890",
              "user": {
                "id": 1,
                "name": "Super Admin",
                "email": "superadmin@example.com",
                "role": "superadmin"
